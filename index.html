<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suger: Help Center Templates</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#F05526;--brand-bg:#FEF0EA;--brand-text:#4A1500;
  --bg:#F5F3EE;--surface:#FFFFFF;--s2:#EDEAE3;--s3:#E0DDD5;
  --text:#111110;--t2:#4A4A48;--t3:#98988E;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.16);--border3:rgba(0,0,0,0.28);
  --b-bg:#EBF3FF;--b-t:#1558B0;--w-bg:#FFF6E0;--w-t:#7A4600;
  --g-bg:#EDFAF2;--g-t:#186B38;--p-bg:#F3EFFE;--p-t:#5A1DB5;
  --r:6px;--rl:10px;--rx:12px;
}
@media(prefers-color-scheme:dark){:root{
  --brand:#F07845;--brand-bg:#301800;--brand-text:#F5D0B0;
  --bg:#0C0C0A;--surface:#161614;--s2:#1E1E1C;--s3:#272725;
  --text:#F0EDE8;--t2:#9A9A94;--t3:#545450;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--border3:rgba(255,255,255,0.22);
  --b-bg:#081630;--b-t:#82BAF5;--w-bg:#221400;--w-t:#F5C660;
  --g-bg:#081A10;--g-t:#75D094;--p-bg:#110828;--p-t:#BA98F2;
}}
html,body{height:100%}
body{font-family:"Plus Jakarta Sans",system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;font-size:15px;-webkit-font-smoothing:antialiased}
.app-bar{height:52px;padding:0 28px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;display:flex;align-items:center}
.logo-wrap{display:flex;align-items:center;gap:10px}
.wordmark{font-size:18px;font-weight:800;letter-spacing:-.05em;color:var(--text);line-height:1}
@media(prefers-color-scheme:dark){.wordmark{color:var(--brand)}}
.logo-sep{width:1px;height:18px;background:var(--border2)}
.logo-sub{font-size:13px;font-weight:500;color:var(--t2)}
.main{max-width:920px;margin:0 auto;padding:28px 28px 64px;width:100%}
.intro{margin-bottom:24px}.intro h1{font-size:22px;font-weight:800;letter-spacing:-.035em}
.sec-lbl{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:11px}
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px}
.card-grid-1{display:grid;grid-template-columns:1fr;gap:10px}
.tcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px 14px;cursor:pointer;transition:border-color .15s;position:relative;overflow:hidden}
.tcard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--_accent);border-radius:var(--rl) 0 0 var(--rl)}
.tcard:hover{border-color:var(--border3)}
.card-head{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.card-icon{width:30px;height:30px;border-radius:7px;background:var(--s2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;color:var(--_accent)}
.card-name{font-size:14px;font-weight:700;color:var(--text);letter-spacing:-.01em}
.card-desc{font-size:12px;color:var(--t2);padding-left:40px;line-height:1.55;margin-bottom:4px}
.card-ex{font-size:11px;color:var(--t3);padding-left:40px}
.decision-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:12px}
.dg-cell{padding:12px 14px;background:var(--surface);font-size:12px}
.dg-cell strong{display:block;font-weight:700;color:var(--text);margin-bottom:3px}
.dg-cell p{color:var(--t2);line-height:1.55}
.flow-vis{display:flex;flex-direction:column;align-items:center;gap:8px;padding:12px 0}
.flow-node{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:8px 16px;font-size:12px;font-weight:600;color:var(--text);text-align:center;min-width:130px}
.flow-node.flow-solo{border-style:dashed;color:var(--t2);font-weight:500}
.flow-sub{font-size:10px;font-weight:400;color:var(--t3);margin-top:2px}
.flow-arrow{font-size:11px;color:var(--t3);text-align:center}
.flow-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.cpan{border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:8px}
.cpan-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--surface);font-size:13px;font-weight:600;cursor:pointer;user-select:none;color:var(--t2);transition:background .12s}
.cpan-hdr:hover{background:var(--s2);color:var(--text)}.cpan-hdr.open{color:var(--text);border-bottom:1px solid var(--border)}
.cpan-body{display:none}
.rg{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border)}
.rc{padding:11px 14px;background:var(--surface)}
.rh{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.rh i{font-size:13px;color:var(--t2)}.rh b{font-size:12px;font-weight:700;color:var(--text)}.rc p{font-size:11px;color:var(--t2);line-height:1.55;padding-left:19px}
.rg-full{grid-column:1/-1;padding:11px 14px;background:var(--surface)}
.co-pills{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.cpill{font-size:12px;padding:5px 11px;border-radius:var(--r);flex:1;min-width:130px;line-height:1.5}
.cp-n{background:var(--b-bg);color:var(--b-t)}.cp-t{background:var(--g-bg);color:var(--g-t)}.cp-w{background:var(--w-bg);color:var(--w-t)}.cp-x{background:var(--p-bg);color:var(--p-t)}
.guide{background:var(--surface);border:1px solid var(--border);border-radius:var(--rx);overflow:hidden}
.guide-top{display:flex;align-items:center;justify-content:space-between;padding:11px 20px;border-bottom:1px solid var(--border);gap:10px;flex-wrap:wrap}
.back-btn{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--t2);border:none;background:none;cursor:pointer;font-family:inherit;padding:0;transition:color .12s}
.back-btn:hover{color:var(--text)}
.guide-meta{display:flex;align-items:center;gap:8px}
.guide-name{font-size:14px;font-weight:700;letter-spacing:-.01em}
.view-tabs{display:flex;background:var(--s2);border-radius:var(--r);padding:2px;gap:2px}
.vtab{font-size:12px;font-weight:500;padding:4px 12px;border-radius:5px;border:none;background:transparent;color:var(--t2);cursor:pointer;font-family:inherit;transition:all .12s}
.vtab:hover{color:var(--text)}.vtab.on{background:var(--surface);color:var(--text);font-weight:700;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.pbar{height:2px;background:var(--s2)}.pfill{height:100%;transition:width .3s}
.guide-body{display:flex;min-height:500px}
.g-sb{width:170px;min-width:170px;border-right:1px solid var(--border);padding:14px 8px;overflow-y:auto}
.g-sb-lbl{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--t3);margin:0 6px 10px;display:block}
.si{display:flex;align-items:flex-start;gap:8px;padding:5px 7px;cursor:pointer;border-radius:var(--r);transition:background .1s}
.si:hover,.si.on{background:var(--s2)}
.sdot{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;margin-top:2px}
.slb{font-size:12px;line-height:1.4;margin-top:1px}.slb.on{font-weight:700;color:var(--text)}.slb.off{color:var(--t2)}
.g-con{flex:1;padding:22px;display:flex;flex-direction:column;min-width:0;overflow-y:auto}
.sec-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.snum{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.03em}
.tags{display:flex;gap:5px;flex-wrap:wrap}
.tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap}
.t-req{background:var(--b-bg);color:var(--b-t)}.t-opt{background:var(--s2);color:var(--t3)}
.t-tit{background:var(--s3);color:var(--t2)}.t-tldr{background:var(--w-bg);color:var(--w-t)}
.t-h1{background:var(--b-bg);color:var(--b-t)}.t-h2{background:var(--g-bg);color:var(--g-t)}
.t-h3{background:var(--p-bg);color:var(--p-t)}.t-acc{background:var(--s2);color:var(--t2)}
.t-fmt{background:var(--w-bg);color:var(--w-t)}
.sec-title{font-size:20px;font-weight:800;letter-spacing:-.03em;color:var(--text);margin-bottom:4px}
.sec-fmt-note{display:flex;gap:9px;align-items:flex-start;padding:10px 13px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);margin-bottom:14px;font-size:12px;color:var(--t2);line-height:1.6}
.sfn-tag{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0;margin-top:1px}
.blk{border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:12px}
.blbl{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--t3);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.blk-g{background:var(--bg)}.blk-e{background:var(--surface)}
.bcon{font-size:13px;color:var(--t2);line-height:1.75}
.bcon p{margin-bottom:10px}.bcon p:last-child{margin-bottom:0}
.bcon ul,.bcon ol{padding-left:18px;margin:6px 0 10px}.bcon li{margin-bottom:5px;line-height:1.65}
.bcon strong{color:var(--text);font-weight:600}.bcon em{font-style:italic;color:var(--t3);font-size:12px}
.bcon code{font-family:"SF Mono",Monaco,monospace;font-size:11.5px;background:var(--s2);padding:1px 5px;border-radius:4px;color:var(--text)}
.bsrc{font-size:11px;color:var(--t3);margin-top:10px;display:flex;align-items:center;gap:4px;padding-top:10px;border-top:1px solid var(--border)}
.navrow{display:flex;justify-content:space-between;align-items:center;margin-top:auto;padding-top:16px;border-top:1px solid var(--border)}
.nav-btn{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:500;border:1px solid var(--border2);border-radius:var(--r);padding:6px 14px;background:var(--surface);color:var(--text);cursor:pointer;font-family:inherit;transition:background .12s}
.nav-btn:hover:not(:disabled){background:var(--s2)}.nav-btn:disabled{opacity:.3;cursor:default}
.cpy-btn{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;border:1px solid var(--border);border-radius:var(--r);padding:6px 14px;background:var(--s2);color:var(--t2);cursor:pointer;font-family:inherit;transition:all .12s}
.cpy-btn:hover{background:var(--s3);color:var(--text)}
.pv-banner{padding:9px 20px;background:var(--s2);border-bottom:1px solid var(--border);font-size:12px;color:var(--t2);display:flex;align-items:center;gap:6px}
.pv-scroll{padding:32px 36px;overflow-y:auto;max-height:82vh}
.art .art-title{font-size:28px;font-weight:800;letter-spacing:-.04em;color:var(--text);line-height:1.2;margin-bottom:10px}
.art .tldr{background:var(--s2);border-left:3px solid var(--brand);border-radius:0 var(--r) var(--r) 0;padding:11px 14px;margin-bottom:24px;font-size:14px;color:var(--t2);line-height:1.65}
.art .tldr strong{color:var(--brand);font-weight:700}
.art h1{font-size:18px;font-weight:700;letter-spacing:-.02em;color:var(--text);margin:26px 0 10px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.art h2{font-size:16px;font-weight:700;letter-spacing:-.01em;color:var(--text);margin:18px 0 8px}
.art h3{font-size:14px;font-weight:600;color:var(--text);margin:14px 0 6px}
.art p{font-size:14px;color:var(--t2);line-height:1.75;margin-bottom:10px}
.art ul,.art ol{padding-left:20px;margin-bottom:12px}
.art li{font-size:14px;color:var(--t2);line-height:1.75;margin-bottom:5px}
.art strong{color:var(--text);font-weight:600}
.art code{font-family:"SF Mono",Monaco,monospace;font-size:11.5px;background:var(--s2);padding:1px 5px;border-radius:4px;color:var(--text)}
.art table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:16px}
.art th{text-align:left;padding:9px 12px;background:var(--s2);font-weight:700;font-size:11px;color:var(--t2);border:1px solid var(--border);letter-spacing:.03em;text-transform:uppercase}
.art td{padding:9px 12px;border:1px solid var(--border);color:var(--t2);vertical-align:top;font-size:13px;line-height:1.6}
.art .cal{border-radius:var(--r);padding:11px 14px;margin:12px 0;font-size:13px;line-height:1.65}
.art .c-n{background:var(--b-bg);color:var(--b-t);border-left:3px solid var(--b-t)}
.art .c-t{background:var(--g-bg);color:var(--g-t);border-left:3px solid var(--g-t)}
.art .c-w{background:var(--w-bg);color:var(--w-t);border-left:3px solid var(--w-t)}
.art .c-x{background:var(--p-bg);color:var(--p-t);border-left:3px solid var(--p-t)}
.art details{border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.art details summary{padding:12px 16px;cursor:pointer;font-size:14px;font-weight:500;color:var(--text);list-style:none;display:flex;justify-content:space-between;align-items:center;background:var(--surface);user-select:none}
.art details summary::-webkit-details-marker{display:none}
.art details summary::after{content:"+";font-size:17px;font-weight:300;color:var(--t3);flex-shrink:0}
.art details[open] summary{border-bottom:1px solid var(--border)}.art details[open] summary::after{content:"\2212"}
.art .ab{padding:14px 16px;font-size:13px;color:var(--t2);line-height:1.75}
.art .ab strong{color:var(--text)}.art .ab em{font-style:italic;color:var(--t3);font-size:12px}
.art .ab ol,.art .ab ul{padding-left:18px;margin:6px 0 10px}.art .ab li{font-size:13px;line-height:1.65;margin-bottom:4px}
.art .nlinks{display:flex;flex-direction:column;gap:6px;margin-top:6px}
.art .nl{font-size:14px;color:var(--b-t)}
@media(max-width:640px){
  .app-bar{padding:0 16px}.main{padding:20px 16px 48px}
  .card-grid,.decision-grid{grid-template-columns:1fr}.rg{grid-template-columns:1fr}
  .g-sb{width:115px;min-width:115px}.g-con{padding:14px}.pv-scroll{padding:20px 16px}
}

</style>
</head>
<body>
<header class="app-bar">
  <div class="logo-wrap">
    <span class="wordmark">suger</span>
    <span class="logo-sep"></span>
    <span class="logo-sub">Help Center Templates</span>
  </div>
</header>
<div class="main"><div id="app"></div></div>
<script>

function sfn(hl) {
  const m = {
    "st-title":["t-tit","Title","Styled text above the article body. No heading tag. 8 words or fewer."],
    "st-tldr": ["t-tldr","TLDR block","No heading tag. Bold TLDR: as the label, then regular text follows on the same line. 1\u20132 sentences."],
    "st-h1":   ["t-h1","H1","Every main section: Overview, Key terms, Prerequisites, step phases, Verify, What happens in [external system], Next steps, Frequently Asked Questions (FAQs), Troubleshooting."],
    "st-h2":   ["t-h2","H2","Subsections within an H1 \u2014 a sub-phase, a configuration area, or a named sub-topic within a section."],
    "st-h3":   ["t-h3","H3","Sub-subsections within an H2. Use sparingly. If you need H3 often, the article is probably too complex and should be split."],
    "st-acc":  ["t-acc","Accordion","Inside Frequently Asked Questions (FAQs) and Troubleshooting H1 sections only. One accordion per question or per error."],
  };
  const d = m[hl] || m["st-h1"];
  return `<div class="sec-fmt-note"><span class="sfn-tag ${d[0]}">${d[1]}</span><span>${d[2]}</span></div>`;
}

const T = [
{name:"Base article anatomy", icon:"ti-layout-2", accent:"#F05526", badge:"base", group:"base",
use:"The foundation every Suger article is built on. Start here before picking a specific type.",
ex:"All article types follow this anatomy",

preview:`
<div class="art-title">Connect HubSpot to Suger</div>
<div class="tldr"><strong>TLDR:</strong> Link HubSpot to Suger to automatically sync deals as co-sell referrals with AWS, Azure, and GCP. No manual data entry between systems.</div>

<h1>Overview</h1>
<p>The HubSpot integration keeps your deals and cloud partner co-sell programs in sync automatically. When a deal updates in HubSpot, it flows into Suger, so your sales team can work entirely from their CRM without switching tools.</p>

<h1>Key terms</h1>
<table><thead><tr><th>Term</th><th>What it means</th></tr></thead><tbody>
<tr><td><strong>Co-sell referral</strong></td><td>A deal submitted to a cloud partner (AWS, Azure, GCP) for joint pursuit. Suger creates and tracks these from your CRM.</td></tr>
<tr><td><strong>Integration user</strong></td><td>A dedicated, non-personal HubSpot account used by Suger to read and write data. Using a dedicated account prevents disruption if a personal account is deactivated.</td></tr>
</tbody></table>

<h1>Prerequisites</h1>
<ul>
<li>HubSpot account with Admin access</li>
<li>A dedicated integration user with view and edit permissions on contacts, companies, and deals, plus App Marketplace access</li>
<li>Suger account with Integration Manager role</li>
</ul>

<h1>Connect HubSpot</h1>
<ol>
<li>In Suger, go to <strong>Settings</strong> &rarr; <strong>Integrations</strong> and click <strong>+ Connect</strong>.</li>
<li>Select <strong>HubSpot</strong> from the list.</li>
<li>Log in with your integration user when the authorization page opens.</li>
<li>Select your account, then click <strong>Choose Account</strong>.</li>
<li>Review permissions, then click <strong>Connect App</strong>.</li>
<li>Back in Suger, find HubSpot and click <strong>Verify</strong>.</li>
</ol>

<h1>Verify your connection</h1>
<p>After clicking Verify, the status updates to <strong>Verified</strong> in Settings &rarr; Integrations. If it stays at Pending, confirm the integration user has read access to at least one HubSpot deal, then click Verify again.</p>
<div class="cal c-t">&#x1F4A1; <strong>Tip:</strong> Test by syncing one deal manually before going fully live. This confirms field mapping is working before the integration runs automatically.</div>

<h1>Next steps</h1>
<p>With HubSpot connected, push your first deal to a cloud partner co-sell program. Follow <em>Create a co-sell referral from HubSpot</em>.</p>

<h1>Frequently Asked Questions (FAQs)</h1>
<details><summary>Q: Can I connect more than one HubSpot account?</summary>
<div class="ab">A: No. Suger supports one HubSpot account per organization. To switch, delete the existing integration and reconnect with the new account.</div></details>

<h1>Troubleshooting</h1>
<details><summary>Error: &#x22;Authorization failed&#x22;</summary>
<div class="ab">Your integration user may be missing App Marketplace access. In HubSpot, go to <strong>Settings</strong> &rarr; <strong>Users</strong> &rarr; <strong>Permissions</strong> and confirm App Marketplace access is enabled, then try connecting again.</div></details>
`,

s:[
{n:"01", name:"Title", req:1, hl:"st-title",
 fmt:"No heading tag · 8 words or fewer",
 g:`<p>Every Suger article starts with a title above the article body. No heading tag is applied to it in the CMS.</p>
<ul>
<li>8 words or fewer</li>
<li>For task-based and integration articles: action verb first (Connect, Create, Set up)</li>
<li>For reference, hub, FAQ, and troubleshooting articles: noun phrase (Products in Suger, HubSpot CRM enrichment fields)</li>
<li>What matters most is consistency within each article type. All integration articles should follow the same title pattern. All hub articles should follow the same pattern.</li>
<li>No "How to" at the start. No words ending in -ing. No period at the end.</li>
</ul>`,
 ex:'"Connect HubSpot to Suger" (integration) &middot; "Products in Suger" (hub) &middot; "HubSpot CRM enrichment fields" (reference)', src:"standard anatomy"},

{n:"02", name:"TLDR", req:1, hl:"st-tldr",
 fmt:"No heading tag · bold TLDR: label, regular text follows · 1–2 sentences",
 g:`<p>The TLDR sits directly below the title. It's the one-sentence version of what the article covers before the reader commits to reading it.</p>
<ul>
<li>Format: <strong>TLDR:</strong> in bold, followed by regular text on the same line. No heading tag.</li>
<li>1 to 2 sentences. Name Suger and the tool, feature, or workflow.</li>
<li>Lead with the outcome, not the feature. "Link HubSpot to Suger to sync deals automatically" beats "This article explains the HubSpot integration."</li>
<li>Don't start with "In this article," "This guide covers," or "Welcome to."</li>
</ul>`,
 ex:'"TLDR: Link HubSpot to Suger to automatically sync deals as co-sell referrals with AWS, Azure, and GCP. No manual data entry between systems."', src:"standard anatomy"},

{n:"03", name:"Overview", req:1, hl:"st-h1",
 fmt:"H1 · 2–4 sentences · user benefit first",
 g:`<p>Overview is the first H1 in every Suger article. It sets up what the reader's about to learn or do.</p>
<ul>
<li>Lead with what the user gets out of this, not what the feature does</li>
<li>Task articles: explain what the task achieves and why someone would do it</li>
<li>Hub articles: introduce the section and say this article links out to related task articles</li>
<li>Reference articles: explain what the data represents and who uses it</li>
<li>Don't describe steps here &mdash; that belongs in the body sections</li>
</ul>

{name:'Integration setup', icon:'ti-plug-connected', accent:'#C2590A', badge:'Core', group:'main',
use:'Connecting Suger to an external tool or system',
ex:'Connect HubSpot, set up Datadog, link Salesforce',

preview:`
<div class="art-title">Connect HubSpot to Suger</div>
<div class="tldr"><strong>TLDR:</strong> Link HubSpot to Suger to automatically sync deals as co-sell referrals with AWS and other cloud partners. No manual data entry between systems.</div>

<h1>Overview</h1>
<p>The HubSpot integration automatically keeps your HubSpot deals in sync with cloud partner co-sell programs. When a deal updates in HubSpot, it flows into Suger. When co-sell status changes in a cloud partner program like AWS ACE, it syncs back to HubSpot, so your sales team can work entirely in their CRM without checking the Suger dashboard.</p>
<div class="cal c-n">📌 <strong>Note:</strong> Suger performs all HubSpot actions using the dedicated integration user you set up. Any Suger-driven activity appears under that user&#39;s name in your HubSpot audit log.</div>

<h1>Who sets up what</h1>
<table><thead><tr><th>Admin setup (one-time)</th><th>User setup</th></tr></thead>
<tbody>
<tr><td>Create a dedicated HubSpot integration user</td><td rowspan="2" style="vertical-align:middle">No additional setup required</td></tr>
<tr><td>Connect and verify HubSpot in Suger Settings</td></tr>
</tbody></table>

<h1>Prerequisites</h1>
<ul>
<li>HubSpot account with Admin access</li>
<li>A dedicated integration user (not a personal account) with view and edit permissions on contacts, companies, and deals, plus App Marketplace access</li>
<li>Suger account with Integration Manager role</li>
</ul>

<h1>Connect HubSpot</h1>
<ol>
<li>In Suger, go to <strong>Settings</strong> &rarr; <strong>Integrations</strong> and click <strong>+ Connect</strong>.</li>
<li>Select <strong>HubSpot</strong> from the integration list.</li>
<li>Log in with your integration user when the HubSpot authorization page opens.</li>
<li>Select your account, then click <strong>Choose Account</strong>.</li>
<li>Review the requested permissions, then click <strong>Connect App</strong>.</li>
<li>Back in Suger, find HubSpot in the list and click <strong>Verify</strong>.</li>
</ol>

<h1>Verify your connection</h1>
<p>After clicking Verify, the integration status updates to <strong>Verified</strong> in Settings &rarr; Integrations. If it stays at <strong>Pending</strong>, confirm the integration user has read access to at least one HubSpot deal, then click <strong>Verify</strong> again.</p>
<div class="cal c-t">&#x1F4A1; <strong>Tip:</strong> Before going fully live, test by syncing one deal manually. This confirms field mapping is working before the integration runs automatically.</div>

<h1>Manage the connection</h1>
<p>To update the integration user or re-authenticate, go to <strong>Settings</strong> &rarr; <strong>Integrations</strong> &rarr; <strong>HubSpot</strong> &rarr; <strong>Edit</strong>.</p>
<div class="cal c-w">&#x26A0;&#xFE0F; <strong>Warning:</strong> Deleting the HubSpot integration immediately stops all co-sell syncing. Existing records in Suger are kept, but no new updates will sync until you reconnect.</div>

<h1>Next steps</h1>
<p>With HubSpot connected, push your first deal to a cloud partner co-sell program. Follow <em>Create a co-sell referral from HubSpot</em>.</p>

<h1>Frequently Asked Questions (FAQs)</h1>
<details><summary>Q: Can I connect more than one HubSpot account?</summary>
<div class="ab">A: No. Suger supports one HubSpot account per organization. To switch, delete the existing integration and reconnect with the new account.</div></details>
<details><summary>Q: How often does Suger sync with HubSpot?</summary>
<div class="ab">A: Deal updates sync in real time. CRM Enrichment data refreshes every 12 hours at midnight and noon UTC.</div></details>

<h1>Troubleshooting</h1>
<details><summary>Error: &#x22;Authorization failed&#x22;</summary>
<div class="ab">
<p>This error usually means the integration user is missing a required permission.</p>
<p><strong>Fix 1: Confirm App Marketplace access</strong></p>
<em>Why start here: This is the most frequently missing permission. The integration user often has CRM access but not App Marketplace access, which is required to authorize the Suger app.</em>
<ol>
<li>In HubSpot, go to <strong>Settings</strong> &rarr; <strong>Users</strong> &rarr; <strong>Permissions</strong>.</li>
<li>Find the integration user and confirm <strong>App Marketplace access</strong> is enabled.</li>
<li>Return to Suger and try connecting again.</li>
</ol>
<div class="fix-div">
<p><strong>Fix 2: Re-invite the integration user</strong></p>
<em>Why try this next: Permission changes do not always propagate to active sessions. Re-inviting forces a clean session with the updated permissions applied.</em>
<ol>
<li>In HubSpot, deactivate and re-invite the integration user.</li>
<li>Accept the invitation and confirm permissions are correct.</li>
<li>Return to Suger and reconnect from Settings &rarr; Integrations.</li>
</ol>
</div>
</div></details>
<details><summary>Error: Status stays &#x22;Pending&#x22; after clicking Verify</summary>
<div class="ab">
<p>Verify requires Suger to read at least one deal to confirm access. If the integration user has no readable deals, Verify cannot complete.</p>
<p><strong>Fix 1: Confirm deal access</strong></p>
<em>Why start here: The integration user must have read access to at least one deal. No visible deals means Verify will always fail.</em>
<ol>
<li>In HubSpot, confirm the integration user can view at least one deal record.</li>
<li>Click <strong>Verify</strong> again in Suger Settings &rarr; Integrations.</li>
</ol>
</div></details>
`,

preview:`
<div class="art-title">Create a private offer in AWS Marketplace</div>
<div class="tldr"><strong>TLDR:</strong> Send a custom-priced deal to a specific buyer through AWS Marketplace using Suger. This guide covers the full flow from offer creation in Suger to buyer acceptance in AWS.</div>

<h1>Overview</h1>
<p>A private offer lets you negotiate custom pricing, contract length, and payment schedule for a specific buyer. This guide covers the complete flow: creating and configuring the offer in Suger, sending it to the buyer, and what happens next in AWS Marketplace.</p>

<h1>Prerequisites</h1>
<ul>
<li>AWS Marketplace integration connected and verified in Suger</li>
<li>Product listed and live in AWS Marketplace</li>
<li>Suger account with Offer Manager role</li>
<li>Buyer&#39;s AWS Account ID</li>
</ul>

<h1>Step 1: Create the offer</h1>
<ol>
<li>In Suger, go to <strong>Offers</strong> and click <strong>+ New Offer</strong>.</li>
<li>Select <strong>AWS Marketplace</strong> as the marketplace.</li>
<li>Select <strong>Private Offer</strong> as the offer type.</li>
<li>Search for and select your product.</li>
</ol>

<h1>Step 2: Set pricing and terms</h1>
<ol>
<li>Enter an <strong>Offer Name</strong>. This is an internal reference only. The buyer will not see it.</li>
<li>Set the contract duration, start date, and payment schedule.</li>
<li>Configure the pricing dimensions.</li>
</ol>
<div class="cal c-n">&#x1F4CC; <strong>Note:</strong> If your product uses usage-based billing, add a $0.01 placeholder dimension. AWS locks pricing dimensions once a listing is live. This placeholder lets you add overage billing later without creating a new listing.</div>

<h1>Step 3: Send to buyer</h1>
<ol>
<li>Enter the buyer&#39;s <strong>AWS Account ID</strong>.</li>
<li>Review all offer details, then click <strong>Create Offer</strong>.</li>
<li>Click <strong>Send to Buyer</strong>.</li>
</ol>

<h1>What happens in AWS Marketplace</h1>
<div class="cal c-x">&#x1F4CB; <strong>The next step happens in AWS Marketplace, not in Suger.</strong> We link to the acceptance guide rather than documenting those steps here. AWS controls their console interface and may update it at any time. Documenting those steps in this article would make it unreliable every time AWS makes a change.</div>
<p>Once you send the offer, AWS automatically emails the buyer with acceptance instructions. The buyer completes acceptance in their own AWS Marketplace account.</p>
<div class="nlinks"><span class="nl">&rarr; Accept a private offer in AWS Marketplace</span></div>

<h1>Verify acceptance in Suger</h1>
<p>After the buyer accepts, the offer status in Suger updates from <strong>PENDING_ACCEPTANCE</strong> to <strong>ACTIVE</strong> in the Offers dashboard. This typically happens within a few minutes of the buyer completing acceptance.</p>

<h1>Next steps</h1>
<p>With the offer active, you can track usage and billing from the Suger dashboard. If your product uses usage-based pricing, start reporting metering so the buyer is billed correctly. See <em>Report usage for AWS Marketplace</em>.</p>

<h1>Frequently Asked Questions (FAQs)</h1>
<details><summary>Q: Can I edit an offer after sending it to the buyer?</summary>
<div class="ab">A: No. Once sent, offer terms are locked. Expire the existing offer and create a new one with the updated terms.</div></details>
<details><summary>Q: How long does the buyer have to accept?</summary>
<div class="ab">A: AWS private offers expire after 45 days by default. You can set a shorter expiration date during offer creation in Suger.</div></details>

<h1>Troubleshooting</h1>
<details><summary>Error: &#x22;Product not eligible for private offer&#x22;</summary>
<div class="ab">
<p>This error means the product is not in a state that allows private offers to be created.</p>
<p><strong>Fix 1: Check the product&#39;s listing status</strong></p>
<em>Why start here: The product must be Live in AWS Marketplace before Suger can create private offers for it. A product in Draft or Pending review will always trigger this error.</em>
<ol>
<li>In Suger, go to <strong>Products</strong> &rarr; <strong>AWS Marketplace</strong>.</li>
<li>Check the product&#39;s status. If it shows Draft or Pending review, wait for AWS approval before creating offers.</li>
</ol>
<div class="fix-div">
<p><strong>Fix 2: Confirm the product is linked to an active listing</strong></p>
<em>Why try this next: If the product exists in Suger but is not linked to a live AWS Marketplace listing, Suger cannot create offers even if the status shows Live internally.</em>
<ol>
<li>Open the product in Suger and go to <strong>Marketplace settings</strong>.</li>
<li>Confirm the AWS Marketplace listing ID is populated and matches an active listing in your AWS Marketplace Management Portal.</li>
</ol>
</div>
</div></details>
`,

preview:`
<div class="art-title">Products in Suger</div>
<div class="tldr"><strong>TLDR:</strong> The Products section in Suger is where you manage all your cloud marketplace listings. Create, configure, and track products across AWS, Azure, and GCP from one place.</div>

<h1>Overview</h1>
<p>A product in Suger is a listing on a cloud marketplace. Before you can send private offers, run co-sell motions, or track marketplace revenue, you need at least one product listed and live. This article introduces the Products section, explains what you will find there, and links to every task you can perform from this page.</p>

<h1>What&#39;s on this page</h1>
<p>When you open <strong>Products</strong> in the Suger console, you see a table of all your marketplace listings. Here is what each column shows:</p>
<table><thead><tr><th>Column</th><th>What it shows</th></tr></thead>
<tbody>
<tr><td><strong>Product name</strong></td><td>The display name of your listing as it appears on the marketplace.</td></tr>
<tr><td><strong>Marketplace</strong></td><td>The cloud marketplace this listing is on: AWS, Azure, GCP, or Snowflake.</td></tr>
<tr><td><strong>Status</strong></td><td>The current listing state: Draft, Pending review, or Live.</td></tr>
<tr><td><strong>Last updated</strong></td><td>The date and time of the most recent change to this product.</td></tr>
</tbody></table>
<h2>Product status explained</h2>
<p>A product must be <strong>Live</strong> before you can create private offers or submit it for co-sell. Products in <strong>Draft</strong> or <strong>Pending review</strong> are not yet visible to buyers.</p>
<h2>Filters and search</h2>
<p>Use the search bar to find a product by name. Use the <strong>Marketplace</strong> filter to narrow results to a specific cloud provider.</p>

<h1>What you can do here</h1>
<ul>
<li><strong>Create a new listing</strong> &mdash; Add a new product to AWS, Azure, GCP, or Snowflake Marketplace.</li>
<li><strong>Edit a listing</strong> &mdash; Update a product&#39;s name, description, or pricing details.</li>
<li><strong>Set up pricing models</strong> &mdash; Configure flat-rate, usage-based, or contract pricing for your product.</li>
<li><strong>Track listing status</strong> &mdash; See which products are live, awaiting review, or still in draft.</li>
</ul>

<h1>Next steps</h1>
<p>Choose a marketplace to create your first product listing:</p>
<div class="nlinks">
<span class="nl">&rarr; Create a product listing in AWS Marketplace</span>
<span class="nl">&rarr; Create a product listing in Azure Marketplace</span>
<span class="nl">&rarr; Create a product listing in GCP Marketplace</span>
<span class="nl">&rarr; Set up usage-based pricing</span>
</div>

<h1>Frequently Asked Questions (FAQs)</h1>
<details><summary>Q: Can I list the same product on multiple marketplaces?</summary>
<div class="ab">A: Yes. Each marketplace listing is managed separately in Suger, but you can reuse the same product details across AWS, Azure, and GCP.</div></details>
<details><summary>Q: How long does AWS take to review a new listing?</summary>
<div class="ab">A: AWS and GCP listings typically take 3 to 5 business days. Azure listings can take up to 2 weeks depending on plan complexity.</div></details>
`,

<div class="art-title">HubSpot CRM enrichment fields</div>
<div class="tldr"><strong>TLDR:</strong> Reference for all intelligence signals available through Suger&#39;s CRM Enrichment feature. Includes AWS, Azure, and GCP engagement scores and marketplace activity data that sync to your HubSpot records.</div>

<h1>Overview</h1>
<p>CRM Enrichment automatically populates your HubSpot records with cloud partner intelligence from AWS Partner Network, Azure Partner Center, and GCP Partner Advantage. Suger maps these signals to custom HubSpot properties you define and refreshes them every 12 hours. For setup instructions, see <em>Configure HubSpot CRM Enrichment</em>.</p>

<h1>AWS signals</h1>
<table><thead><tr><th>Label</th><th>API name</th><th>Description</th></tr></thead>
<tbody>
<tr><td>AWS Engagement Score</td><td><code>aws_engagement_score</code></td><td>Score from 0 to 100 from AWS Partner Network reflecting this account&#39;s co-sell activity and deal history with AWS partners.</td></tr>
<tr><td>AWS Marketplace Count</td><td><code>aws_marketplace_count</code></td><td>Number of active AWS Marketplace listings associated with this company&#39;s domain.</td></tr>
<tr><td>AWS Marketplace Review Count</td><td><code>aws_review_count</code></td><td>Total customer reviews on this company&#39;s AWS Marketplace listings.</td></tr>
<tr><td>AWS Marketplace Purchase Count</td><td><code>aws_purchase_count</code></td><td>Number of marketplace purchases associated with this account on AWS.</td></tr>
</tbody></table>

<h1>Azure signals</h1>
<table><thead><tr><th>Label</th><th>API name</th><th>Description</th></tr></thead>
<tbody>
<tr><td>Azure Engagement Score</td><td><code>azure_engagement_score</code></td><td>Composite score from Azure Partner Center combining usage, event participation, and marketplace activity.</td></tr>
<tr><td>Azure Event Score</td><td><code>azure_event_score</code></td><td>Score reflecting this account&#39;s participation in Azure partner events and training programs.</td></tr>
<tr><td>Azure Marketplace Count</td><td><code>azure_marketplace_count</code></td><td>Number of active Azure Marketplace listings for this company&#39;s domain.</td></tr>
</tbody></table>

<h1>Common use cases</h1>
<ul>
<li>Filter by <strong>AWS Engagement Score &gt; 50</strong> to surface accounts with active co-sell history in your pipeline.</li>
<li>Filter by <strong>AWS Marketplace Purchase Count &gt; 0</strong> to target companies already buying on AWS Marketplace.</li>
<li>Sort by <strong>Azure Engagement Score</strong> to prioritize outreach for your Azure co-sell motion.</li>
</ul>

<h1>Frequently Asked Questions (FAQs)</h1>
<details><summary>Q: How often are enrichment fields updated?</summary>
<div class="ab">A: Suger runs enrichment syncs twice daily at midnight and noon UTC. Data from the previous sync is replaced each time, not appended.</div></details>
<details><summary>Q: What does an empty field mean?</summary>
<div class="ab">A: The company is either not registered with that cloud partner program, or Suger could not match the record to a known company domain. Confirm the company&#39;s domain is populated in HubSpot.</div></details>
`,

<div class="art-title">AWS Marketplace private offers: Frequently Asked Questions (FAQs)</div>
<div class="tldr"><strong>TLDR:</strong> Answers to the most common questions about creating, editing, pricing, and canceling private offers in AWS Marketplace through Suger.</div>

<h1>Overview</h1>
<p>This article answers common questions about the private offer workflow in AWS Marketplace. Questions are grouped by topic. If you need step-by-step instructions, see <em>Create a private offer in AWS Marketplace</em>.</p>
<div class="cal c-n">&#x1F4CC; <strong>Note:</strong> This article covers private offers managed through Suger. For questions about the AWS Marketplace console itself, refer to the AWS Marketplace seller documentation.</div>

<h1>Creating offers</h1>
<details><summary>Q: Can I create an offer without a product listed in AWS Marketplace?</summary>
<div class="ab">A: No. You need a Live product in AWS Marketplace before creating a private offer. If your product is in Draft or Pending review, wait for AWS to approve the listing first.</div></details>
<details><summary>Q: How many buyers can I include in a single private offer?</summary>
<div class="ab">A: Each private offer is for a single AWS buyer account. Create separate offers for each buyer.</div></details>
<details><summary>Q: Can I create a private offer for a product in Pending review status?</summary>
<div class="ab">A: No. The product must show Live status before Suger can create private offers for it.</div></details>

<h1>Editing and canceling</h1>
<details><summary>Q: Can I edit an offer after sending it to the buyer?</summary>
<div class="ab">A: No. Once sent, offer terms are locked. Expire the offer in Suger and create a new one with the updated terms.</div></details>
<details><summary>Q: Can I extend the expiration date after sending the offer?</summary>
<div class="ab">A: No. AWS doesn't support extending expiration dates on sent offers. Expire the offer and re-create it with a new date.</div></details>
<details><summary>Q: How do I cancel an offer the buyer has not accepted yet?</summary>
<div class="ab">A: In Suger, go to <strong>Offers</strong>, open the offer, and click <strong>Expire Offer</strong>. The buyer receives a notification that the offer is no longer available.</div></details>

<h1>Pricing and billing</h1>
<details><summary>Q: Can I use multiple pricing dimensions in one offer?</summary>
<div class="ab">A: Yes. AWS supports up to 24 pricing dimensions in a single private offer.</div></details>
<details><summary>Q: Can I offer a price lower than my public listing price?</summary>
<div class="ab">A: Yes. Private offers support custom pricing that can differ from your public listing price, including discounts.</div></details>
<details><summary>Q: What happens if the buyer doesn't accept before the offer expires?</summary>
<div class="ab">A: The offer expires automatically and the buyer can no longer accept it. Create and send a new offer to continue the conversation.</div></details>
`,

{name:'Troubleshooting guide', icon:'ti-tool', accent:'#A03030', badge:'Standalone', group:'solo',
use:'A dedicated troubleshooting article for more than 5 errors or complex multi-step fixes',
ex:'AWS Marketplace integration troubleshooting, co-sell sync error reference',

preview:`
<div class="art-title">AWS Marketplace integration: Troubleshooting guide</div>
<div class="tldr"><strong>TLDR:</strong> Fixes for the most common errors when connecting, verifying, and syncing your AWS Marketplace integration in Suger. Fixes are ordered from simplest to most involved.</div>

<h1>Overview</h1>
<p>This guide covers errors specific to the AWS Marketplace integration in Suger. Before looking up a specific error, confirm these first:</p>
<ul>
<li>Your IAM Role name is exactly <strong>Suger-Role</strong>. The name is case-sensitive.</li>
<li>The integration status in Suger shows <strong>Verified</strong>, not just Connected.</li>
<li>Your AWS account has Marketplace seller access enabled.</li>
</ul>
<p>For setup instructions, see <em>Connect AWS Marketplace to Suger</em>.</p>

<h1>Authentication errors</h1>
<p>These errors occur when Suger can't access or assume your AWS IAM Role. Most are caused by a naming mismatch, a missing trust policy, or the role being in the wrong AWS account.</p>

<h2>Error: "IAM Role 'Suger-Role' not found in AWS"</h2>
<p>Suger can't find the IAM Role it needs to access your AWS account.</p>

<h3>Fix 1: Confirm the role name is exactly right</h3>
<p><em>Why start here: The role name is case-sensitive. "suger-role" or "Suger-Role " with a trailing space will fail. Check the name before anything else.</em></p>
<ol>
<li>In your AWS console, go to <strong>IAM</strong> &rarr; <strong>Roles</strong>.</li>
<li>Search for <strong>Suger-Role</strong>: capital S, capital R, no spaces.</li>
<li>If the name doesn't match exactly, rename the role or re-create it with the correct name.</li>
</ol>

<h3>Fix 2: Confirm the role is in the correct AWS account</h3>
<p><em>Why try this next: If you manage multiple AWS accounts, the role may be in the wrong one. Suger looks for it in the account ID you provided during setup.</em></p>
<ol>
<li>In Suger, go to <strong>Settings</strong> &rarr; <strong>Integrations</strong> &rarr; <strong>AWS Marketplace</strong> &rarr; <strong>Edit</strong>.</li>
<li>Confirm the AWS Account ID matches the account where you created the IAM Role.</li>
<li>If they don't match, create the role in the correct account or update the account ID in Suger.</li>
</ol>

<h3>Fix 3: Re-create the IAM Role using the Suger setup guide</h3>
<p><em>Why this is last: Use this only when the role exists and the account ID is correct, but Suger still can't find it. This usually means the role has conflicting configuration from a previous failed setup.</em></p>
<ol>
<li>In Suger, download the latest IAM setup template from <strong>Settings</strong> &rarr; <strong>Integrations</strong> &rarr; <strong>AWS Marketplace</strong> &rarr; <strong>Setup Guide</strong>.</li>
<li>In AWS IAM, delete the existing Suger-Role.</li>
<li>Follow the template to re-create the role from scratch.</li>
<li>Return to Suger and click <strong>Verify</strong>.</li>
</ol>

<h2>Error: "Permission denied when assuming role"</h2>
<p>The role exists but Suger can't use it. The trust policy is the most likely cause.</p>

<h3>Fix 1: Update the trust policy</h3>
<p><em>Why start here: The trust policy controls which AWS accounts can assume the Suger-Role. If Suger's AWS account ID is missing or has a typo, Suger will always be denied.</em></p>
<ol>
<li>In Suger, download the latest trust policy template from the Setup Guide.</li>
<li>In AWS IAM Console, open <strong>Suger-Role</strong> &rarr; <strong>Trust relationships</strong>.</li>
<li>Replace the existing policy with the downloaded template.</li>
<li>Return to Suger and click <strong>Verify</strong>.</li>
</ol>

<h3>Fix 2: Confirm the permissions policy is attached</h3>
<p><em>Why try this next: If the trust policy is correct but the error persists, the role may be missing the permissions policy Suger needs to read marketplace data.</em></p>
<ol>
<li>In AWS IAM Console, open <strong>Suger-Role</strong> &rarr; <strong>Permissions</strong>.</li>
<li>Confirm the Suger permissions policy is attached. If it's missing, download it from the Setup Guide and attach it.</li>
<li>Click <strong>Verify</strong> in Suger.</li>
</ol>

<h1>Sync errors</h1>
<p>These errors occur when Suger can't read or update data from your AWS Marketplace account after the integration is connected.</p>

<h2>Error: "Product sync failed: listing not found"</h2>
<p>Suger can't find the AWS Marketplace listing that corresponds to this product.</p>

<h3>Fix 1: Confirm the listing is still active in AWS</h3>
<p><em>Why start here: The listing may have been deleted directly in AWS Marketplace. Checking takes 30 seconds and resolves most cases.</em></p>
<ol>
<li>Log in to the <strong>AWS Marketplace Management Portal</strong>.</li>
<li>Search for the product by name and confirm it shows an active status.</li>
<li>If it was deleted, re-create the listing in AWS and re-link it in Suger under <strong>Products</strong> &rarr; <strong>AWS Marketplace</strong>.</li>
</ol>

<h3>Fix 2: Trigger a manual sync</h3>
<p><em>Why try this next: If the listing is active but Suger still shows the error, the product data in Suger may be stale from a previous failed sync. A manual sync forces Suger to re-read the listing from AWS.</em></p>
<ol>
<li>In Suger, go to <strong>Products</strong> &rarr; <strong>AWS Marketplace</strong>.</li>
<li>Open the product and click <strong>Sync</strong>.</li>
<li>Wait 2 to 3 minutes, then refresh the page.</li>
</ol>

<h1>Still need help?</h1>
<p>If the error isn't listed here or the fixes don't resolve the issue, contact <strong>Suger Support</strong> with:</p>
<ul>
<li>The exact error message, copied from the screen</li>
<li>The timestamp of when the error occurred</li>
<li>Your AWS Account ID</li>
<li>The name or ID of the affected product or offer</li>
</ul>
`,

const RULES = [
  {i:'ti-tag', l:'Title', t:'8 words or fewer. Action verb for task and integration articles. Noun phrase for reference, hub, and FAQ articles. No "How to." No words ending in -ing. No period at the end.'},
  {i:'ti-file-text', l:'TLDR block', t:'No heading tag. Starts with TLDR: on the same line, not as a heading. 1 to 2 sentences. Names Suger and the tool or feature. Leads with user benefit, not feature description.'},
  {i:'ti-heading', l:'Headings', t:'H1 for every main section. H2 for subsections within an H1. H3 for sub-subsections within H2, used sparingly. Sentence case always. Never title case.'},
  {i:'ti-list', l:'Lists', t:'Numbered lists for sequential steps. Restart the list from 1 under each new H1 phase. Bulleted lists for non-sequential items. All items in any list must start with the same type of word (parallel structure). Always introduce a list with a colon.'},
  {i:'ti-bold', l:'Bold', t:'UI elements only: button names, tab names, menu labels, field names, status values. Match the exact capitalization shown in the product. Never bold Suger, AWS, Azure, GCP, or general text for emphasis.'},
  {i:'ti-link', l:'Links', t:'Use the exact article title as link text. Never "click here" or "read more." For steps happening outside Suger: use a cross-system callout and link to the external article. Never document external steps directly.'},
];


/* STATE */
let at=0,as_=0,gv="guide";
function A(){return document.getElementById("app");}

function rPick(){
  const card=(t,i)=>`<div class="tcard" onclick="gT(${i})" style="--_accent:${t.accent}">
    <div class="card-head">
      <div class="card-icon"><i class="ti ${t.icon}"></i></div>
      <div class="card-name">${t.name}</div>
    </div>
    <div class="card-desc">${t.use}</div>
    <div class="card-ex">${t.ex}</div>
  </div>`;
  const base=T.filter(t=>t.group==="base"),
        main=T.filter(t=>t.group==="main"),
        solo=T.filter(t=>t.group==="solo");
  A().innerHTML=`
    <div class="intro"><h1>Article templates</h1></div>
    <div class="sec-lbl">Start here</div>
    <div class="card-grid-1" style="margin-bottom:22px">${base.map(t=>card(t,T.indexOf(t))).join("")}</div>
    <div class="sec-lbl">Article types</div>
    <div class="card-grid" style="margin-bottom:22px">${main.map(t=>card(t,T.indexOf(t))).join("")}</div>
    <div class="sec-lbl">Standalone documents</div>
    <div class="card-grid" style="margin-bottom:28px">${solo.map(t=>card(t,T.indexOf(t))).join("")}</div>
    <div class="cpan" style="margin-bottom:8px">
      <div class="cpan-hdr" id="dg-hdr" onclick="tP('dg')">
        <span><i class="ti ti-route" style="margin-right:7px;vertical-align:-2px;font-size:14px"></i>How to pick the right template</span>
        <i class="ti ti-chevron-down" id="dg-ic" style="font-size:13px;transition:transform .2s"></i>
      </div>
      <div class="cpan-body" id="dg-b">
        <div style="padding:16px 20px;border-bottom:1px solid var(--border)">
          <p style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px">Start with what the reader is trying to do &mdash; not with the content you have.</p>
          <div class="decision-grid">
            <div class="dg-cell"><strong>They want to understand a feature or page</strong><p>Use <strong>Hub article</strong> &mdash; but only if multiple task articles branch off it. If there's only one task linked to it, skip the hub. A hub with one link is just an introduction, not a hub.</p></div>
            <div class="dg-cell"><strong>They want to connect Suger to another tool</strong><p>Use <strong>Integration setup</strong>. The deliverable is "Tool X is now connected to Suger." If the deliverable is "I've completed action X in Suger," use Task-based.</p></div>
            <div class="dg-cell"><strong>They want to complete a specific task</strong><p>Use <strong>Task-based</strong>. Covers operational tasks, finance workflows (refunds, reconciliation), and end-to-end flows spanning Suger and an external system.</p></div>
            <div class="dg-cell"><strong>They want to look up a field, status, or data value</strong><p>Use <strong>Reference / Data</strong>. For structured data &mdash; field definitions, status lists, metrics. If the answer needs prose explanation, it might be FAQ instead.</p></div>
            <div class="dg-cell"><strong>They have questions but don't need step-by-step</strong><p>Use <strong>FAQ article</strong> for 5+ questions, or questions spanning multiple subtopics. Fewer than 5? Add them to the relevant article instead.</p></div>
            <div class="dg-cell"><strong>Something isn't working</strong><p>Use <strong>Troubleshooting guide</strong> for 5+ errors or complex multi-step fixes. Fewer than 5? Add a Troubleshooting section to the relevant task article instead.</p></div>
          </div>
        </div>
        <div style="padding:16px 20px;border-bottom:1px solid var(--border);font-size:12px;color:var(--t2);line-height:1.75">
          <p style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px">Edge cases</p>
          <ul style="padding-left:16px">
            <li style="margin-bottom:8px"><strong>"Data isn't syncing &mdash; is this a troubleshooting article or integration setup?"</strong><br>Integration setup if the question is "how do I set this up correctly?" Troubleshooting if the integration is already set up and something broke. Troubleshooting lives after the connection is already established.</li>
            <li style="margin-bottom:8px"><strong>"My task spans Suger and an external system (like a buyer accepting in AWS)."</strong><br>Use Task-based. The "What happens in [external system]" section handles the hand-off. The task starts and ends in Suger even when there's a middle step elsewhere.</li>
            <li style="margin-bottom:8px"><strong>"Integration setup or Task-based?"</strong><br>Integration setup if the result is "the tool is now connected." Task-based if the result is "I've completed an action." Connecting HubSpot &rarr; Integration setup. Creating a co-sell from HubSpot &rarr; Task-based.</li>
            <li style="margin-bottom:8px"><strong>"Reference or FAQ?"</strong><br>Reference for structured data (fields, statuses, values). FAQ for questions that need explanatory answers. "What does PENDING_ACCEPTANCE mean?" can go either way &mdash; if it fits in a table, use Reference; if it needs context, use FAQ.</li>
            <li style="margin-bottom:8px"><strong>"FAQ or Troubleshooting?"</strong><br>Troubleshooting if the question is "why isn't X working" or "how do I fix X." FAQ if nothing's broken. "What happens if the buyer doesn't accept?" &rarr; FAQ. "The buyer accepted but status isn't updating" &rarr; Troubleshooting.</li>
            <li><strong>"Hub or just a task article?"</strong><br>Hub only when multiple task articles branch off it and users need to understand the feature landscape first. One associated task &rarr; skip the hub. Just listing loosely related links &rarr; that's a category page, not a hub.</li>
          </ul>
        </div>
        <div style="padding:16px 20px;font-size:12px;color:var(--t2);line-height:1.75">
          <p style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px">The article flow &mdash; in the order a user encounters them</p>
          <div class="flow-vis">
            <div class="flow-node">Hub article<div class="flow-sub">What is this? What can I do?</div></div>
            <div class="flow-arrow">&#x2193;</div>
            <div class="flow-row">
              <div class="flow-node">Task-based<div class="flow-sub">How do I do X?</div></div>
              <div class="flow-node">Integration setup<div class="flow-sub">How do I connect Y?</div></div>
              <div class="flow-node">Reference / Data<div class="flow-sub">What does Z mean?</div></div>
            </div>
            <div class="flow-arrow">&#x2193; When questions or errors pile up</div>
            <div class="flow-row">
              <div class="flow-node flow-solo">FAQ article<div class="flow-sub">5+ common questions</div></div>
              <div class="flow-node flow-solo">Troubleshooting guide<div class="flow-sub">5+ errors or complex fixes</div></div>
            </div>
          </div>
          <p style="margin-top:10px">For a complex feature, you'll often write all of these. Start with the hub, then the task articles it links to, then reference for any data fields users need, and build FAQ/troubleshooting as real questions and errors emerge from users.</p>
        </div>
      </div>
    </div>
    <div class="cpan">
      <div class="cpan-hdr" id="rf-hdr" onclick="tP('rf')">
        <span><i class="ti ti-list-check" style="margin-right:7px;vertical-align:-2px;font-size:14px"></i>Formatting reference</span>
        <i class="ti ti-chevron-down" id="rf-ic" style="font-size:13px;transition:transform .2s"></i>
      </div>
      <div class="cpan-body" id="rf-b">
        <div class="rg">
          ${RULES.map(r=>`<div class="rc"><div class="rh"><i class="ti ${r.i}"></i><b>${r.l}</b></div><p>${r.t}</p></div>`).join("")}
          <div class="rg-full">
            <b style="font-size:12px;color:var(--text)">Callout types and how to use them</b>
            <p style="font-size:11px;color:var(--t2);margin:6px 0 10px;line-height:1.6">
              <strong>Placement:</strong> Notes go before the content they add context to. Warnings go before the step they protect &mdash; never after it. Tips go after the main content as an optional enhancement.<br>
              <strong>Frequency:</strong> One callout per section, maximum. Never two in a row without prose between them. If removing the callout would make the content worse, keep it. If the main text already says it, cut it.
            </p>
            <div class="co-pills">
              <div class="cpill cp-n"><strong>&#x1F4CC; Note</strong> &mdash; Expected behavior, timing, or context the user needs before continuing</div>
              <div class="cpill cp-t"><strong>&#x1F4A1; Tip</strong> &mdash; Best practice or shortcut. Place after the main content.</div>
              <div class="cpill cp-w"><strong>&#x26A0;&#xFE0F; Warning</strong> &mdash; Irreversible action, blocker, or step that breaks the workflow if missed. Place before the step it applies to.</div>
              <div class="cpill cp-x"><strong>&#x1F4CB; Cross-system</strong> &mdash; Steps happening outside Suger. Always link out. Never document external steps directly.</div>
            </div>
          </div>
        </div>
      </div>
    </div>`;
}

function rGuide(){
  const t=T[at];if(gv==="preview"){rPrev();return;}
  const sec=t.s[as_],tot=t.s.length,pct=Math.round(((as_+1)/tot)*100);
  const hlN={"st-title":"Title","st-tldr":"TLDR","st-h1":"H1","st-h2":"H2","st-h3":"H3","st-acc":"Accordion"};
  const hlT={"st-title":"t-tit","st-tldr":"t-tldr","st-h1":"t-h1","st-h2":"t-h2","st-h3":"t-h3","st-acc":"t-acc"};
  const hlKey=sec.hl||"st-h1";
  const sb=t.s.map((s,i)=>{
    const done=i<as_,cur=i===as_;
    const ds=done?"background:var(--s3);color:var(--t3)":cur?`background:${t.accent};color:#fff`:"border:1.5px solid var(--border2);color:var(--t3);background:transparent";
    return `<div class="si ${cur?"on":""}" onclick="gS(${i})"><div class="sdot" style="${ds}">${done?"&#x2713;":i+1}</div><span class="slb ${cur?"on":"off"}">${s.name}</span></div>`;
  }).join("");
  const exBl=sec.ex?`<div class="blk blk-e"><div class="blbl"><i class="ti ti-file-text"></i>Example from Suger docs</div><div class="bcon">${sec.ex}</div>${sec.src?`<div class="bsrc"><i class="ti ti-link" style="font-size:11px"></i>${sec.src}</div>`:""}</div>`:"";
  A().innerHTML=`<div class="guide">
    <div class="guide-top">
      <button class="back-btn" onclick="rPick()"><i class="ti ti-arrow-left" style="font-size:13px"></i> Templates</button>
      <div class="guide-meta"><i class="ti ${t.icon}" style="font-size:15px;color:${t.accent}"></i><span class="guide-name" style="color:${t.accent}">${t.name}</span></div>
      <div class="view-tabs">
        <button class="vtab ${gv==="guide"?"on":""}" onclick="sV('guide')">Guide</button>
        <button class="vtab ${gv==="preview"?"on":""}" onclick="sV('preview')">Example</button>
      </div>
    </div>
    <div class="pbar"><div class="pfill" style="width:${pct}%;background:${t.accent}"></div></div>
    <div class="guide-body">
      <div class="g-sb"><span class="g-sb-lbl">Sections</span>${sb}</div>
      <div class="g-con">
        <div class="sec-meta"><span class="snum">${sec.n}</span><div class="tags"><span class="tag ${sec.req?"t-req":"t-opt"}">${sec.req?"Required":"Optional"}</span><span class="tag ${hlT[hlKey]}">${hlN[hlKey]}</span><span class="tag t-fmt">${(sec.fmt||"").split(" \xb7 ")[0]}</span></div></div>
        <div class="sec-title">${sec.name}</div>
        ${sfn(hlKey)}
        <div class="blk blk-g"><div class="blbl"><i class="ti ti-pencil"></i>How to write it</div><div class="bcon">${sec.g}</div></div>
        ${exBl}
        <div class="navrow">
          <button class="nav-btn" onclick="gPv()" ${as_>0?"":"disabled"}><i class="ti ti-arrow-left" style="font-size:13px"></i> Prev</button>
          <button class="cpy-btn" onclick="doCopy()" title="Copies a blank article skeleton to your clipboard. Paste it into your CMS or doc editor to start writing."><i class="ti ti-copy"></i><span id="cl">Copy starter</span></button>
          <button class="nav-btn" onclick="gNx()" ${as_<tot-1?"":"disabled"}>Next <i class="ti ti-arrow-right" style="font-size:13px"></i></button>
        </div>
      </div>
    </div>
  </div>`;
}

function rPrev(){
  const t=T[at];
  A().innerHTML=`<div class="guide">
    <div class="guide-top">
      <button class="back-btn" onclick="rPick()"><i class="ti ti-arrow-left" style="font-size:13px"></i> Templates</button>
      <div class="guide-meta"><i class="ti ${t.icon}" style="font-size:15px;color:${t.accent}"></i><span class="guide-name" style="color:${t.accent}">${t.name}</span></div>
      <div class="view-tabs"><button class="vtab" onclick="sV('guide')">Guide</button><button class="vtab on">Example</button></div>
    </div>
    <div class="pv-banner"><i class="ti ti-eye" style="font-size:13px"></i>A complete example showing heading levels, TLDR formatting, callouts, step numbering, and FAQ/Troubleshooting structure.</div>
    <div class="pv-scroll"><div class="art">${t.preview}</div></div>
  </div>`;
}

function gT(i){at=i;as_=0;gv="guide";rGuide();}
function gS(i){as_=i;rGuide();}
function gNx(){if(as_<T[at].s.length-1){as_++;rGuide();}}
function gPv(){if(as_>0){as_--;rGuide();}}
function sV(v){gv=v;v==="preview"?rPrev():rGuide();}
function tP(id){
  const b=document.getElementById(id+"-b"),h=document.getElementById(id+"-hdr"),ic=document.getElementById(id+"-ic");
  if(!b)return;
  const open=b.style.display==="none"||!b.style.display;
  b.style.display=open?"block":"none";
  if(h)h.classList.toggle("open",open);
  if(ic)ic.style.transform=open?"rotate(180deg)":"";
}
function doCopy(){
  const t=T[at];
  const hlL={"st-title":"Title (no heading tag)","st-tldr":"TLDR block (bold TLDR: label, regular text follows)","st-h1":"H1","st-h2":"H2","st-h3":"H3","st-acc":"Accordion item under H1"};
  const secs=t.s.map(s=>{
    const lv=hlL[s.hl||"st-h1"];
    const req=s.req?"Required":"Optional";
    if(s.hl==="st-title")return`# [Article title here]\n*${lv}*`;
    if(s.hl==="st-tldr")return`**TLDR:** [Summary sentence here.]\n*${req} \xb7 ${lv}*`;
    if(s.hl==="st-acc")return`## ${s.name}\n*${req} \xb7 ${lv}*\n\n**Q:** [Question?]\n**A:** [Answer.]`;
    return`## ${s.name}\n*${req} \xb7 ${lv}*\n\n[Your content here]`;
  }).join("\n\n---\n\n");
  const md=`# ${t.name} \u2014 blank starter\n*Paste this into your CMS or doc editor to begin writing. Delete the italicized notes before publishing.*\n\n${secs}`;
  navigator.clipboard.writeText(md).then(()=>{
    const el=document.getElementById("cl");
    if(el){el.textContent="Copied!";setTimeout(()=>{const e=document.getElementById("cl");if(e)e.textContent="Copy starter";},2200);}
  }).catch(()=>{const el=document.getElementById("cl");if(el){el.textContent="Try again";setTimeout(()=>{const e=document.getElementById("cl");if(e)e.textContent="Copy starter";},2000);}});
}
rPick();
